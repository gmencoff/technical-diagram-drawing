objects:
  - type: rf.SeriesChain
    id: txSystem
    objects:
      - type: rf.SignalGenerator
        id: sigGen
      - type: rf.Block
        id: splitter
        label: Splitter
        inputPorts: 1
        outputPorts: 4
        textOrientation: vertical
      - type: rf.ParallelChain
        id: txFrontEnd
        count: 4
        objects:
          - type: rf.PhaseShifter
            id: phaseShifter
          - type: antenna.Element
            id: element

  - type: rf.SeriesChain
    id: rxSystem
    objects:
      - type: antenna.Element
        id: probe
        orientation: left
      - type: rf.Block
        id: receiver
        label: Receiver
        outputPorts: 0

  - type: annotation.Rectangle
    id: arrayBox
    topLeft: txFrontEnd.1.element.topLeft
    bottomRight: txFrontEnd.4.element.bottomRight
    padding: 15
    paddingLeft: 0
    stroke: green
    strokeDasharray: "5 3"

  - type: annotation.Text
    id: arrayLabel
    anchor: arrayBox.top
    content: "Test Array"
    offsetY: -12
    fontSize: 14
    fill: green
