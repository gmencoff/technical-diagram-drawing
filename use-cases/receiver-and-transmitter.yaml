objects:
  - type: rf.SeriesChain
    id: rxSystem
    objects:
      - type: rf.ParallelChain
        id: rxFrontEnd
        count: 4
        objects:
          - type: antenna.Element
            id: element
          - type: rf.PhaseShifter
            id: phaseShifter
      - type: rf.Block
        id: rxDivider
        label: Power Divider
        inputPorts: 4
        outputPorts: 1
      - type: rf.Block
        id: rxBlock
        label: Receiver

  - type: rf.SeriesChain
    id: txSystem
    objects:
      - type: rf.Block
        id: txBlock
        label: Transmitter
      - type: rf.Block
        id: txDivider
        label: Power Divider
        inputPorts: 1
        outputPorts: 4
      - type: rf.ParallelChain
        id: txFrontEnd
        count: 4
        objects:
          - type: rf.PhaseShifter
            id: phaseShifter
          - type: antenna.Element
            id: element
